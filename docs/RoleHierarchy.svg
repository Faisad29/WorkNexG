<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="900" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">WorkNexG — Role Hierarchy</text>
  <text x="550" y="64" text-anchor="middle" font-size="12" fill="#64748b">Multi-tenant Workforce Management Platform</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEVEL 0 — SUPER ADMIN                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="370" y="85" width="360" height="68" rx="10" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="550" y="113" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Super Admin</text>
  <text x="550" y="131" text-anchor="middle" font-size="11" fill="#ddd6fe">Platform-level · Global access to ALL companies</text>
  <text x="550" y="147" text-anchor="middle" font-size="10" fill="#c4b5fd">View · Add · Edit · Block · Delete · All Features</text>

  <!-- Connector: Super Admin → Platform Layer -->
  <line x1="550" y1="153" x2="550" y2="185" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEVEL 1 — PLATFORM / COMPANY BOUNDARY              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="160" y="185" width="780" height="36" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="550" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Company / Tenant Boundary  (Multi-tenant isolation)</text>

  <!-- Connector: Platform boundary → Company Admin -->
  <line x1="550" y1="221" x2="550" y2="253" stroke="#0d9488" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEVEL 2 — COMPANY ADMIN                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="330" y="253" width="440" height="68" rx="10" fill="#0d9488" stroke="#0f766e" stroke-width="1.5"/>
  <text x="550" y="281" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Company Admin</text>
  <text x="550" y="299" text-anchor="middle" font-size="11" fill="#ccfbf1">Tenant-level · Full access within OWN company only</text>
  <text x="550" y="315" text-anchor="middle" font-size="10" fill="#99f6e4">View · Add · Edit · Delete · Block · Settings · Reports</text>

  <!-- Connectors from Company Admin to 5 role nodes -->
  <!-- HR Manager at x=120 -->
  <line x1="550" y1="321" x2="550" y2="345" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="550" y1="345" x2="120" y2="345" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="120" y1="345" x2="120" y2="375" stroke="#0d9488" stroke-width="1.5"/>
  <!-- Supervisor at x=300 -->
  <line x1="550" y1="345" x2="300" y2="345" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="300" y1="345" x2="300" y2="375" stroke="#0d9488" stroke-width="1.5"/>
  <!-- (center line already drawn) -->
  <!-- Accountant at x=700 -->
  <line x1="550" y1="345" x2="700" y2="345" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="700" y1="345" x2="700" y2="375" stroke="#0d9488" stroke-width="1.5"/>
  <!-- Employee at x=960 -->
  <line x1="550" y1="345" x2="960" y2="345" stroke="#0d9488" stroke-width="1.5"/>
  <line x1="960" y1="345" x2="960" y2="375" stroke="#0d9488" stroke-width="1.5"/>
  <!-- HR Manager center drop -->
  <line x1="550" y1="321" x2="550" y2="375" stroke="#0d9488" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEVEL 3 — SCOPED ROLES (5 boxes)                   -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- HR Manager -->
  <rect x="35" y="375" width="170" height="58" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="120" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">HR Manager</text>
  <text x="120" y="413" text-anchor="middle" font-size="9.5" fill="#bfdbfe">Employees · Attendance</text>
  <text x="120" y="427" text-anchor="middle" font-size="9.5" fill="#bfdbfe">Leave · Compliance</text>

  <!-- Supervisor -->
  <rect x="215" y="375" width="170" height="58" rx="8" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>
  <text x="300" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Supervisor</text>
  <text x="300" y="413" text-anchor="middle" font-size="9.5" fill="#cffafe">Attendance · Leave</text>
  <text x="300" y="427" text-anchor="middle" font-size="9.5" fill="#cffafe">Team oversight</text>

  <!-- HR Manager center (no label — already drawn) -->
  <!-- Actually let me put a "custom roles" node at center -->
  <rect x="455" y="375" width="190" height="58" rx="8" fill="#475569" stroke="#334155" stroke-width="1.5"/>
  <text x="550" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Custom Roles</text>
  <text x="550" y="413" text-anchor="middle" font-size="9.5" fill="#cbd5e1">Configurable permissions</text>
  <text x="550" y="427" text-anchor="middle" font-size="9.5" fill="#cbd5e1">per company</text>

  <!-- Accountant -->
  <rect x="615" y="375" width="170" height="58" rx="8" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="700" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Accountant</text>
  <text x="700" y="413" text-anchor="middle" font-size="9.5" fill="#fef3c7">Payroll · Finance</text>
  <text x="700" y="427" text-anchor="middle" font-size="9.5" fill="#fef3c7">Reports (finance)</text>

  <!-- Employee -->
  <rect x="875" y="375" width="170" height="58" rx="8" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="960" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Employee</text>
  <text x="960" y="413" text-anchor="middle" font-size="9.5" fill="#bbf7d0">My Attendance</text>
  <text x="960" y="427" text-anchor="middle" font-size="9.5" fill="#bbf7d0">My Payroll · My Docs</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEVEL 4 — MODULE BLOCKS (Company Admin scope)      -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Connector line for modules -->
  <line x1="550" y1="433" x2="550" y2="475" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="100" y1="475" x2="1000" y2="475" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Module: Company Mgmt -->
  <line x1="130" y1="475" x2="130" y2="505" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="40" y="505" width="180" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="505" width="180" height="26" rx="8" fill="#7c3aed"/>
  <rect x="40" y="523" width="180" height="8" fill="#7c3aed"/>
  <text x="130" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Company Mgmt</text>
  <text x="130" y="547" text-anchor="middle" font-size="10" fill="#475569">✓ View Companies</text>
  <text x="130" y="562" text-anchor="middle" font-size="10" fill="#475569">✓ Add / Edit</text>
  <text x="130" y="577" text-anchor="middle" font-size="10" fill="#475569">✓ Block / Unblock</text>
  <text x="130" y="592" text-anchor="middle" font-size="10" fill="#475569">✓ Delete</text>

  <!-- Module: Employee Mgmt -->
  <line x1="310" y1="475" x2="310" y2="505" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="220" y="505" width="180" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="220" y="505" width="180" height="26" rx="8" fill="#0d9488"/>
  <rect x="220" y="523" width="180" height="8" fill="#0d9488"/>
  <text x="310" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Employee Mgmt</text>
  <text x="310" y="547" text-anchor="middle" font-size="10" fill="#475569">✓ View / Add / Edit</text>
  <text x="310" y="562" text-anchor="middle" font-size="10" fill="#475569">✓ Block / Deactivate</text>
  <text x="310" y="577" text-anchor="middle" font-size="10" fill="#475569">✓ Delete</text>
  <text x="310" y="592" text-anchor="middle" font-size="10" fill="#475569">✓ Import / Export</text>

  <!-- Module: Attendance -->
  <line x1="490" y1="475" x2="490" y2="505" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="400" y="505" width="180" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="400" y="505" width="180" height="26" rx="8" fill="#0891b2"/>
  <rect x="400" y="523" width="180" height="8" fill="#0891b2"/>
  <text x="490" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Attendance</text>
  <text x="490" y="547" text-anchor="middle" font-size="10" fill="#475569">✓ View / Check-In/Out</text>
  <text x="490" y="562" text-anchor="middle" font-size="10" fill="#475569">✓ Override Records</text>
  <text x="490" y="577" text-anchor="middle" font-size="10" fill="#475569">✓ GPS Validation</text>
  <text x="490" y="592" text-anchor="middle" font-size="10" fill="#475569">✓ Reports</text>

  <!-- Module: Leave -->
  <line x1="670" y1="475" x2="670" y2="505" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="580" y="505" width="180" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="580" y="505" width="180" height="26" rx="8" fill="#16a34a"/>
  <rect x="580" y="523" width="180" height="8" fill="#16a34a"/>
  <text x="670" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Leave</text>
  <text x="670" y="547" text-anchor="middle" font-size="10" fill="#475569">✓ View Requests</text>
  <text x="670" y="562" text-anchor="middle" font-size="10" fill="#475569">✓ Request / Apply</text>
  <text x="670" y="577" text-anchor="middle" font-size="10" fill="#475569">✓ Approve / Reject</text>
  <text x="670" y="592" text-anchor="middle" font-size="10" fill="#475569">✓ Balances</text>

  <!-- Module: Payroll -->
  <line x1="850" y1="475" x2="850" y2="505" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="760" y="505" width="180" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="760" y="505" width="180" height="26" rx="8" fill="#d97706"/>
  <rect x="760" y="523" width="180" height="8" fill="#d97706"/>
  <text x="850" y="522" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Payroll</text>
  <text x="850" y="547" text-anchor="middle" font-size="10" fill="#475569">✓ View / Generate</text>
  <text x="850" y="562" text-anchor="middle" font-size="10" fill="#475569">✓ Approve / Reject</text>
  <text x="850" y="577" text-anchor="middle" font-size="10" fill="#475569">✓ Salary Config</text>
  <text x="850" y="592" text-anchor="middle" font-size="10" fill="#475569">✓ Export</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM ROW — remaining modules                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="130" y1="605" x2="130" y2="635" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="40" y="635" width="180" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="635" width="180" height="26" rx="8" fill="#6d28d9"/>
  <rect x="40" y="653" width="180" height="8" fill="#6d28d9"/>
  <text x="130" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Roles &amp; Permissions</text>
  <text x="130" y="675" text-anchor="middle" font-size="10" fill="#475569">✓ Create / Edit Roles</text>
  <text x="130" y="690" text-anchor="middle" font-size="10" fill="#475569">✓ Assign Permissions</text>
  <text x="130" y="705" text-anchor="middle" font-size="10" fill="#475569">✓ User Role Assignment</text>

  <line x1="310" y1="605" x2="310" y2="635" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="220" y="635" width="180" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="220" y="635" width="180" height="26" rx="8" fill="#475569"/>
  <rect x="220" y="653" width="180" height="8" fill="#475569"/>
  <text x="310" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Compliance</text>
  <text x="310" y="675" text-anchor="middle" font-size="10" fill="#475569">✓ Iqama / Visa Tracking</text>
  <text x="310" y="690" text-anchor="middle" font-size="10" fill="#475569">✓ Document Upload</text>
  <text x="310" y="705" text-anchor="middle" font-size="10" fill="#475569">✓ Expiry Alerts</text>

  <line x1="490" y1="605" x2="490" y2="635" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="400" y="635" width="180" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="400" y="635" width="180" height="26" rx="8" fill="#475569"/>
  <rect x="400" y="653" width="180" height="8" fill="#475569"/>
  <text x="490" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Reports</text>
  <text x="490" y="675" text-anchor="middle" font-size="10" fill="#475569">✓ Attendance Reports</text>
  <text x="490" y="690" text-anchor="middle" font-size="10" fill="#475569">✓ Payroll Reports</text>
  <text x="490" y="705" text-anchor="middle" font-size="10" fill="#475569">✓ Compliance Reports</text>

  <line x1="670" y1="605" x2="670" y2="635" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="580" y="635" width="180" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="580" y="635" width="180" height="26" rx="8" fill="#475569"/>
  <rect x="580" y="653" width="180" height="8" fill="#475569"/>
  <text x="670" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Notifications</text>
  <text x="670" y="675" text-anchor="middle" font-size="10" fill="#475569">✓ Send / Manage</text>
  <text x="670" y="690" text-anchor="middle" font-size="10" fill="#475569">✓ Templates</text>
  <text x="670" y="705" text-anchor="middle" font-size="10" fill="#475569">✓ Broadcast</text>

  <line x1="850" y1="605" x2="850" y2="635" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="760" y="635" width="180" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="760" y="635" width="180" height="26" rx="8" fill="#475569"/>
  <rect x="760" y="653" width="180" height="8" fill="#475569"/>
  <text x="850" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Company Settings</text>
  <text x="850" y="675" text-anchor="middle" font-size="10" fill="#475569">✓ Org Profile</text>
  <text x="850" y="690" text-anchor="middle" font-size="10" fill="#475569">✓ Timezone / Locale</text>
  <text x="850" y="705" text-anchor="middle" font-size="10" fill="#475569">✓ Integrations</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="785" width="1020" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="806" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Legend</text>

  <rect x="60" y="818" width="16" height="16" rx="3" fill="#7c3aed"/>
  <text x="82" y="830" font-size="10" fill="#475569">Super Admin (Platform-global)</text>

  <rect x="240" y="818" width="16" height="16" rx="3" fill="#0d9488"/>
  <text x="262" y="830" font-size="10" fill="#475569">Company Admin (Tenant-scoped)</text>

  <rect x="450" y="818" width="16" height="16" rx="3" fill="#2563eb"/>
  <text x="472" y="830" font-size="10" fill="#475569">HR Manager</text>

  <rect x="560" y="818" width="16" height="16" rx="3" fill="#0891b2"/>
  <text x="582" y="830" font-size="10" fill="#475569">Supervisor</text>

  <rect x="660" y="818" width="16" height="16" rx="3" fill="#d97706"/>
  <text x="682" y="830" font-size="10" fill="#475569">Accountant</text>

  <rect x="760" y="818" width="16" height="16" rx="3" fill="#16a34a"/>
  <text x="782" y="830" font-size="10" fill="#475569">Employee</text>

  <rect x="860" y="818" width="16" height="16" rx="3" fill="#475569"/>
  <text x="882" y="830" font-size="10" fill="#475569">Modules / Features</text>

  <text x="550" y="862" text-anchor="middle" font-size="10" fill="#94a3b8">All scoped roles operate strictly within their own company tenant. Super Admin bypasses tenant isolation entirely.</text>
</svg>
